<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect 4 Multiplayer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

    <div id="app-container">
        
        <section id="landing-screen" class="screen active">
            <h1>Connect 4</h1>
            <p>Play with a friend across the internet. No sign-ups required.</p>
            <button id="btn-host-game" class="primary-btn">Host a Game</button>
        </section>

        <section id="lobby-screen" class="screen">
            <h1>Game Lobby</h1>
            
            <div id="host-view" style="display: none;">
                <p>Share this link with your friend:</p>
                <input type="text" id="invite-link" readonly>
                <button id="btn-copy-link" class="secondary-btn">Copy Link</button>
                <p class="status-message">Waiting for opponent to knock...</p>
                
                <div id="approval-box" class="hidden">
                    <p>Someone wants to join!</p>
                    <button id="btn-accept" class="success-btn">Let them in</button>
                    <button id="btn-deny" class="danger-btn">Deny</button>
                </div>
            </div>

            <div id="guest-view" style="display: none;">
                <p class="status-message">Knocking on host's door... Waiting for approval.</p>
            </div>
        </section>

        <section id="game-screen" class="screen">
            <div class="game-header">
                <h2 id="turn-indicator">Waiting to start...</h2>
            </div>
            
            <div id="board" class="connect4-board">
                </div>
        </section>

    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <script src="js/gameLogic.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/network.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
